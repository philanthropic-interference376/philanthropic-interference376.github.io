name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A88C6D: ${{ secrets.A88C6D }}
          BA3EEC: ${{ secrets.BA3EEC }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A88C6D', '')
          sec_b = os.environ.get('BA3EEC', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 7c7b2bfbc946ae78ad7098facf669e62 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 5cb587847d885ba711e077ddd28fd7d5 -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
